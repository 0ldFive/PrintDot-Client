name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            package: windows
          - os: macos-13
            platform: darwin/amd64
            package: macos-amd64
          - os: macos-14
            platform: darwin/arm64
            package: macos-arm64
          - os: ubuntu-22.04
            platform: linux/amd64
            package: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Build
        run: wails build -clean -platform ${{ matrix.platform }}

      - name: Build (Windows installer)
        if: matrix.os == 'windows-latest'
        run: wails build -clean -nsis

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path build/bin -Filter "*installer*.exe" | Select-Object -First 1
          if (-not $installer) {
            $installer = Get-ChildItem -Path build/bin -Filter "*.exe" | Select-Object -First 1
          }
          if (-not $installer) {
            Write-Error "No Windows installer or exe found in build/bin"
          }
          Compress-Archive -Path $installer.FullName -DestinationPath build/PrintDot-windows.zip

      - name: Package (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          APP_PATH=$(find build/bin -maxdepth 2 -type d -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build/bin" >&2
            exit 1
          fi
          if [ ! -d "$APP_PATH/Contents" ]; then
            echo "Invalid .app bundle: $APP_PATH" >&2
            exit 1
          fi
          echo "Packaging $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/PrintDot-${{ matrix.package }}.zip

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ ! -d "build/bin" ]; then
            echo "build/bin not found" >&2
            exit 1
          fi
          tar -czf build/PrintDot-linux.tar.gz -C build/bin .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintDot-${{ matrix.os }}
          path: build/PrintDot-*

  release:
    name: create-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
